name: release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  packages: write

env:
  BINARY_NAME: auto-server

jobs:
  build-linux:
    name: Build Linux ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: auto-server-linux-x86_64-unknown-linux-gnu
          - target: x86_64-unknown-linux-musl
            artifact: auto-server-linux-x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-gnu
            artifact: auto-server-linux-aarch64-unknown-linux-gnu
          - target: aarch64-unknown-linux-musl
            artifact: auto-server-linux-aarch64-unknown-linux-musl

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        uses: taiki-e/install-action@cross

      - name: Build binary
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${BINARY_NAME} "dist/${{ matrix.artifact }}"
          tar -C dist -czf "dist/${{ matrix.artifact }}.tar.gz" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz
          if-no-files-found: error

  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build binary
        run: cargo build --release --target x86_64-pc-windows-msvc --locked

      - name: Stage artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target\x86_64-pc-windows-msvc\release\${env:BINARY_NAME}.exe dist\${env:BINARY_NAME}.exe
          Compress-Archive -Path dist\${env:BINARY_NAME}.exe -DestinationPath dist\auto-server-windows-x86_64-pc-windows-msvc.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-server-windows-x86_64-pc-windows-msvc
          path: dist/auto-server-windows-x86_64-pc-windows-msvc.zip
          if-no-files-found: error

  build-macos:
    name: Build macOS aarch64
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build binary
        run: cargo build --release --target aarch64-apple-darwin --locked

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp target/aarch64-apple-darwin/release/${BINARY_NAME} "dist/auto-server-macos-aarch64-apple-darwin"
          tar -C dist -czf dist/auto-server-macos-aarch64-apple-darwin.tar.gz auto-server-macos-aarch64-apple-darwin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-server-macos-aarch64-apple-darwin
          path: dist/auto-server-macos-aarch64-apple-darwin.tar.gz
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
      - build-macos

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release-assets/**/*
          fail_on_unmatched_files: true

  publish-docker:
    name: Publish Docker ${{ matrix.suffix }}
    runs-on: ubuntu-latest
    needs: build-linux
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: auto-server-linux-x86_64-unknown-linux-musl
            platform: linux/amd64
            suffix: amd64
          - artifact: auto-server-linux-aarch64-unknown-linux-musl
            platform: linux/arm64
            suffix: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist

      - name: Prepare image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/moon-toll-station" >> "$GITHUB_ENV"

      - name: Prepare Docker staging
        run: |
          tar -xzf "dist/${{ matrix.artifact }}.tar.gz" -C dist
          mv "dist/${{ matrix.artifact }}" dist/auto-server

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ matrix.suffix }}
            ${{ env.IMAGE_NAME }}:latest-${{ matrix.suffix }}
